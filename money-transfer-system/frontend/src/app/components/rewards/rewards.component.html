<div class="container mt-4">
  <div class="rewards-header mb-4 text-center">
    <h2>Your Rewards</h2>
    <p>Earn points for every transfer over $100.</p>
  </div>

  <div class="card mb-4 text-center">
    <h3>Total Points Earned</h3>
    <div class="reward-points" style="font-size: 3rem; font-weight: bold; color: var(--primary-color);">
      {{ summary.totalRewards }}
    </div>
  </div>

  <div class="card">
    <h3 class="mb-3">Reward History</h3>
    <div *ngIf="rewards.length === 0" class="text-center" style="color: var(--text-muted); padding: 2rem;">
      <p>No rewards earned yet.</p>
    </div>
    
    <div *ngIf="rewards.length > 0" class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let reward of rewards">
            <td>{{ reward.createdOn | date:'medium' }}</td>
            <td>{{ reward.description }}</td>
            <td style="color: var(--primary-color); font-weight: bold;">+{{ reward.amount }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  
  <div class="text-center mt-4">
    <a routerLink="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
  </div>
</div>
