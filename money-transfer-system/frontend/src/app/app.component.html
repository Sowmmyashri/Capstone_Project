<div class="app-layout">
    <nav class="navbar">
        <div class="container nav-content">
            <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
                <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#6366f1" />
                    <stop offset="100%" stop-color="#a855f7" />
                </linearGradient>
            </svg>
            <a routerLink="/" class="nav-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-send">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                <span>MoneyTransfer</span>
            </a>
            
            <div class="nav-links" *ngIf="authService.isLoggedIn()" style="display: flex; gap: 1.5rem; align-items: center;">
                <a routerLink="/dashboard" class="nav-link" routerLinkActive="active">Dashboard</a>
                <a routerLink="/transfer" class="nav-link" routerLinkActive="active">Transfer</a>
                <a routerLink="/history" class="nav-link" routerLinkActive="active">History</a>
                <a routerLink="/rewards" class="nav-link" routerLinkActive="active">Rewards</a>
                <button (click)="logout()" class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem;">Logout</button>
            </div>
            <div class="nav-links" *ngIf="!authService.isLoggedIn()" style="display: flex; gap: 1rem;">
                <a routerLink="/login" class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem;">Login</a>
                <a routerLink="/register" class="btn btn-sm" style="padding: 0.5rem 1rem;">Register</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <router-outlet></router-outlet>
    </main>

    <footer class="text-center" style="padding: 2rem; color: var(--text-muted); font-size: 0.875rem;">
        &copy; 2024 Money Transfer System. All rights reserved.
    </footer>
</div>
